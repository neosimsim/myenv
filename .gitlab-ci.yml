default:
  image: nixos/nix:latest

variables:
  # sync with nixos.sh
  NIX_PATH: nixpkgs=https://github.com/NixOS/nixpkgs/archive/bd017d34f4c914fc1842b9fd5b4fc6ca85ab61de.tar.gz

stages:
  - setup
  - build
  - test

.nix-job: &nix-job
  before_script:
    - nix-env -iA nixpkgs.cachix nixpkgs.bash
    - cachix use myenv
    - nix path-info --all > /tmp/store-path-pre-build
  after_script:
    # push all store paths that were added during the build
    - bash -c "comm -13 <(sort /tmp/store-path-pre-build | grep -v '\.drv$') <(nix path-info --all | grep -v '\.drv$' | sort) | cachix push myenv"

agda:
  <<: *nix-job
  stage: setup
  script:
    -  nix-build -E 'with import <nixpkgs> {}; agda'

texfiles:
  <<: *nix-job
  stage: setup
  script:
    - nix-build  -E 'with (import <nixpkgs> {}); texlive.combine { inherit (texlive) scheme-full; texfiles = {pkgs = [ (import ./texfiles { pkgs = (import <nixpkgs> {}); }) ]; }; }'

nix-build:
  <<: *nix-job
  stage: build
  script:
    - NIXPKGS_ALLOW_UNFREE=1 nix-build

nixos.sh:
  <<: *nix-job
  stage: test
  script:
    - ./nixos.sh