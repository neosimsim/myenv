default:
  image: nixos/nix:latest
  before_script:
    - |
      nix-env -iA \
        nixpkgs.nixUnstable \
        nixpkgs.bash \
        nixpkgs.git \
        nixpkgs.cachix

nixos:
  script:
    - nix --experimental-features 'nix-command flakes ca-references' build .#nixosConfigurations.test.config.system.build.toplevel

nix:packagesWithGui:
  script:
    - nix --experimental-features 'nix-command flakes ca-references' build .#packages.x86_64-linux.packagesWithGui

nix:packagesWithoutGui:
  script:
    - nix --experimental-features 'nix-command flakes ca-references' build .#packages.x86_64-linux.packagesWithoutGui
